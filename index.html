<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>#B3n1</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  background: url('bg.jpg') no-repeat center center fixed;
  background-size: cover;
}

/* sötét overlay hogy jobban látszódjon a szöveg */
.overlay {
  background: rgba(0,0,0,0.6);
  min-height: 100vh;
  padding: 20px;
}

/* fejléc */
header {
  text-align: center;
  font-size: 40px;
  font-weight: bold;
  padding: 20px;
  color: #00ffcc;
  text-shadow: 2px 2px 10px black;
}

/* dobozok */
.box {
  max-width: 800px;
  margin: 30px auto;
  padding: 20px;
  background: rgba(0,0,0,0.7);
  border-radius: 15px;
  box-shadow: 0 0 20px rgba(0,255,200,0.3);
}

/* címek */
h2 {
  text-align: center;
  color: #00ffcc;
}

/* gombok */
.btn {
  display: inline-block;
  margin: 10px;
  padding: 12px 20px;
  background: #00ffcc;
  color: black;
  border-radius: 8px;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s;
}

.btn:hover {
  background: white;
}

/* középre */
.center {
  text-align: center;
}
</style>

</head>
<body>

<div class="overlay">

<header>#B3n1</header>

<div class="box">
  <h2>Rólam</h2>
  <p class="center">
    Szia! Beni vagyok 😎  
    Minecraftozok, szervereket építek és videókat csinálok.
  </p>
</div>

<div class="box">
  <h2>Minecraft szerver</h2>
  <p class="center">
    🚧 Minecraft szerverem hamarosan... 🚧<br>
    Dolgozok rajta, stay tuned!
  </p>
</div>

<div class="box">
  <h2>Social</h2>
  <div class="center">
    <a href="https://discord.gg/PeXFgN2vZb" class="btn">Discord</a>
    <a href="#" class="btn">TikTok</a>
    <a href="#" class="btn">YouTube</a>
  </div>
</div>

</div>

</body>
</html>
