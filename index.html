<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magyar Köztársaság | Discord</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2c3e50 100%);
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .container {
            background: rgba(0, 0, 0, 0.7);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 500px;
            border: 2px solid #e74c3c;
        }
        h1 {
            color: #e74c3c;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        p {
            font-size: 1.1em;
            line-height: 1.6;
            color: #bdc3c7;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 30px;
            background-color: #e74c3c;
            color: white;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
        }
        .btn:hover {
            background-color: #c0392b;
            transform: scale(1.05);
        }
        .features {
            margin-top: 20px;
            text-align: left;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🇭🇺 Magyar Köztársaság</h1>
        <p>Csatlakozz a legfejlettebb magyar Discord közösséghez! Gaming, beszélgetés és profi moderáció vár rád.</p>
        
        <div class="features">
            <li>✅ Automata hitelesítés</li>
            <li>🎮 Külön gaming szobák</li>
            <li>🎰 Kaszinó és RPG botok</li>
            <li>🏆 100+ megszerezhető rang</li>
        </div>

        <a href="https://discord.gg/b6casHpXe7" class="btn">BELÉPÉS A SZERVERRE</a>
    </div>

</body>
</html>
